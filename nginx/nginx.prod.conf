# Rate limit zones, keyed by client IP.
# SDK writes are limited far more aggressively than SDK reads or CMS traffic.
# The two maps below split SDK traffic by method: an empty key makes nginx
# skip that zone entirely for the request, so GET/HEAD only count against
# sdk_read_zone and mutating methods only count against sdk_write_zone.
map $request_method $sdk_read_key {
    default         "";
    GET             $binary_remote_addr;
    HEAD            $binary_remote_addr;
}
map $request_method $sdk_write_key {
    default         $binary_remote_addr;
    GET             "";
    HEAD            "";
}

limit_req_zone $binary_remote_addr zone=cms_zone:10m rate=60r/s;
limit_req_zone $sdk_read_key zone=sdk_read_zone:10m rate=30r/s;
limit_req_zone $sdk_write_key zone=sdk_write_zone:10m rate=5r/s;

server {
    listen 7312;

    client_max_body_size 20M;

    # SDK API — API-key authenticated (routers/sdk_documents.py). Reads are
    # rate limited normally; writes (POST/PUT/PATCH/DELETE) get a much
    # stricter zone since they mutate content.
    location /api/sdk/ {
        limit_req zone=sdk_read_zone burst=20 nodelay;
        limit_req zone=sdk_write_zone burst=5 nodelay;

        proxy_pass http://dashtro:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # CMS API — JWT-authenticated frontend traffic.
    location /api/cms/ {
        limit_req zone=cms_zone burst=40 nodelay;

        proxy_pass http://dashtro:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Any other backend routes
    location /api/ {
        proxy_pass http://dashtro:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend — static build served by the same dashtro app container.
    location / {
        proxy_pass http://dashtro:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
