services:

  nginx:
    image: nginx:alpine
    ports:
      - "7312:7312"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashtro
    networks:
      - internal
    restart: unless-stopped

  # Single app image: FastAPI serves both the API and the built frontend
  # (see Dockerfile.dashtro / main.py's static mount + SPA fallback).
  dashtro:
    image: ghcr.io/1atharvad/dashtro:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.dashtro
    volumes:
      - uploads_data:/app/uploads
      # Lets the backup CLI (scripts/cms_schema.py) run directly inside the
      # container against the repo's backup/ dir — no docker cp needed. Pass
      # --backup-dir /app/backup when invoking via `docker compose exec`.
      - ./backup:/app/backup
    environment:
      # Explicit allowlist instead of `env_file: .env` — only what the app
      # actually reads (config.py / api/utils/*) gets into the container,
      # not everything else that happens to be in .env.
      DEBUG: ${DEBUG:-False}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7312}
      CMS_PUBLIC_URL: ${CMS_PUBLIC_URL:-}
      # DB_TYPE: sqlite (default) or postgres. mongodb is not yet migrated to
      # the FastAPI API and is rejected at startup.
      DB_TYPE: ${DB_TYPE:-sqlite}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-db.sqlite3}
      # DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD only matter when
      # DB_TYPE=postgres.
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
    networks:
      - internal
    restart: unless-stopped

  # Optional: only needed if DB_TYPE=postgres and you want a local Postgres
  # instead of pointing DB_HOST at an external one. Not started by default —
  # bring it up explicitly with `docker compose -f docker-compose.prod.yml --profile postgres up`.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  uploads_data:
  postgres_data:
