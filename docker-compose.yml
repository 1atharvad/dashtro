services:

  nginx:
    image: nginx:alpine
    ports:
      - "7312:7312"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./cms_backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - ./cms_backend:/app
      - uploads_data:/app/uploads
    env_file: .env
    environment:
      # Only sqlite is supported for now; postgres/mongodb data clients are
      # not yet migrated to the FastAPI API and are rejected at startup.
      DB_TYPE: sqlite
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./cms-frontend
      dockerfile: Dockerfile
    expose:
      - "5173"
    volumes:
      - ./cms-frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:7312/api/cms

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_modules:
  uploads_data:
